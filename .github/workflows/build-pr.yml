name: Build project on PR

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Updated to match GitHub's preferred version
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install JS Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        # We run this from root since that is where your 'gradlew' lives
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          # Using a wildcard path handles any subfolder shifts automatically
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
