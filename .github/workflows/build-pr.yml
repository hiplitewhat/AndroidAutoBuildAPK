name: Build project on PR

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install JS Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor Android
        run: |
          # Capacitor needs the web output folder to exist before syncing
          mkdir -p dist 
          mkdir -p www
          npx cap add android || true
          npx cap sync android

      - name: Make gradlew executable
        # This fixes the "chmod" error by pointing to the subfolder
        run: chmod +x android/gradlew

      - name: Build Debug APK
        # This fixes the "No such file or directory" error for ./gradlew
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: List built APK
        run: ls -al android/app/build/outputs/apk/debug

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
