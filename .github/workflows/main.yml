name: Build APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APKs (Debug & Release)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug :app:assembleRelease --no-daemon

      - name: APK Path Teller
        run: | 
          echo "--- DEBUG APK LOCATION ---"
          find /app/build/outputs/apk/debug -name "*.apk"
          echo "--- RELEASE APK LOCATION ---"
          find android/app/build/outputs/apk/release -name "*.apk"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: my-app-packages
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
